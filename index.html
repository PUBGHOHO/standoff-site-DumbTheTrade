<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDOFF HUB | Official Site</title>
    <style>
        :root { 
            --orange: #ff4500; 
            --dark: #0a0a0a; 
            --card: rgba(22, 22, 22, 0.85); 
            --text: #ffffff; 
            --rarity: #b035e2; /* Цвет для ножей */
        }
        
        body { 
            background: var(--dark); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Фоновое изображение с размытием */
        .background-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://img.freepik.com/free-photo/view-of-gaming-equipment-with-neon-lights_23-2151048805.jpg'); 
            background-size: cover; background-position: center;
            filter: blur(12px); z-index: -1; transform: scale(1.1); 
        }

        /* Онлайн-статус в углу */
        .online-counter {
            position: fixed; top: 20px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 8px 15px;
            border-radius: 20px; border: 1px solid var(--orange);
            font-size: 13px; backdrop-filter: blur(5px); z-index: 10;
        }

        /* Основной контейнер */
        .container { 
            width: 100%; max-width: 400px; padding: 25px; 
            background: var(--card); border-radius: 25px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); text-align: center;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
            position: relative; animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--orange); margin: 0; font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 69, 0, 0.3); }
        
        .google-btn {
            background: white; color: #444; padding: 12px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: bold; margin: 20px 0; border: none; width: 100%;
            transition: 0.3s;
        }
        .google-btn:hover { background: #eee; transform: scale(1.02); }

        input {
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #444; background: rgba(0, 0, 0, 0.5); 
            color: white; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--orange); }
        
        .btn-main {
            background: var(--orange); color: white; border: none; padding: 16px; 
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.2);
        }
        .btn-main:hover { background: #ff5e00; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 69, 0, 0.4); }

        /* Кабинет */
        #cabinet { display: none; }
        .avatar-circle {
            width: 110px; height: 110px; background: rgba(51, 51, 51, 0.6);
            border-radius: 50%; margin: 15px auto; overflow: hidden;
            border: 3px solid var(--orange); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.2);
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-item span { color: var(--orange); font-weight: bold; font-size: 16px; display: block; margin-top: 4px; }

        /* Инвентарь со скинами */
        .inventory-title { text-align: left; font-size: 14px; margin: 15px 0 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .inventory-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            max-height: 220px; overflow-y: auto; padding-bottom: 10px;
        }
        .skin-card {
            background: rgba(0,0,0,0.4); border-radius: 12px; padding: 10px;
            border-bottom: 4px solid var(--rarity); font-size: 10px; text-align: center;
            animation: scaleIn 0.4s ease;
        }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .skin-card img { width: 80%; height: auto; margin-bottom: 5px; filter: drop-shadow(0 0 5px rgba(176, 53, 226, 0.4)); }

        /* Уведомления снизу */
        #notification {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95); padding: 12px 25px; border-radius: 20px;
            border: 1px solid var(--orange); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div class="online-counter">Online: <span id="onlineCount">1,412</span></div>
    <div id="notification">Пользователь <b>Benz</b> выбил <b>Karambit</b>!</div>

    <div id="auth-form" class="container">
        <h1>STANDOFF HUB</h1>
        <p style="color: #888; font-size: 13px; margin-top: 5px;">Авторизуйтесь в системе</p>
        
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18" style="margin-right:10px">
            Войти через Google
        </button>

        <input type="text" id="nick" placeholder="Ваш игровой ник">
        <input type="email" id="email" placeholder="Ваш Gmail">
        
        <button class="btn-main" onclick="openCabinet()">СОЗДАТЬ КАБИНЕТ</button>
        <p style="font-size: 10px; color: #555; margin-top: 20px;">Нажимая кнопку, вы принимаете Cookie и правила площадки.</p>
    </div>

    <div id="cabinet" class="container">
        <h2 id="userName" style="margin: 0; font-size: 22px;">Никнейм</h2>
        <p id="userMail" style="color: #666; margin: 5px 0 0; font-size: 12px;">email@gmail.com</p>
        
        <div class="avatar-circle" onclick="document.getElementById('photoInput').click()">
            <img id="avatarImg" src="" style="width:100%; height:100%; object-fit: cover; display:none;">
            <span id="plusText" style="font-size: 40px; color: var(--orange);">+</span>
        </div>
        <input type="file" id="photoInput" style="display:none" accept="image/*" onchange="previewImage(event)">

        <div class="stats-grid">
            <div class="stat-item"><small>Баланс</small><span id="balance">0 G</span></div>
            <div class="stat-item"><small>Бонусы</small><span>0</span></div>
            <div class="stat-item"><small>Статус</small><span style="color: #00ff00;">Active</span></div>
        </div>

        <div class="inventory-title">Ваш инвентарь</div>
        <div class="inventory-grid" id="invGrid">
            <div style="grid-column: 1/3; color: #444; padding: 20px; font-style: italic;">Инвентарь пуст...</div>
        </div>

        <input type="text" id="adminCode" placeholder="Введите промокод" style="text-align: center; margin-top: 15px;">
        <button class="btn-main" onclick="checkCode()">ПОПОЛНИТЬ БАЛАНС</button>
    </div>

    <script>
        // Живой счетчик онлайна
        setInterval(() => {
            let base = 1400;
            let rand = Math.floor(Math.random() * 80);
            document.getElementById('onlineCount').innerText = (base + rand).toLocaleString();
        }, 3000);

        // Фейковые уведомления
        function showNotify(text) {
            let n = document.getElementById('notification');
            n.innerHTML = text;
            n.style.bottom = "30px";
            setTimeout(() => { n.style.bottom = "-100px"; }, 4500);
        }
        
        setInterval(() => {
            const players = ["BenzHH", "Roman_K", "Hanna_B", "Standoff_King", "Gold_Hunter", "User_777"];
            const items = ["M9 Dragon Glass", "AWM Genesis", "Karambit Gold", "AKR Treasure Hunter", "Butterfly Starfall"];
            let p = players[Math.floor(Math.random()*players.length)];
            let i = items[Math.floor(Math.random()*items.length)];
            showNotify(`Игрок <b>${p}</b> только что выбил <b>${i}</b>!`);
        }, 12000);

        function googleLogin() {
            let mail = prompt("Выберите аккаунт Google для входа:", "user@gmail.com");
            if (mail) document.getElementById('email').value = mail;
        }

        function openCabinet() {
            let nick = document.getElementById('nick').value;
            let email = document.getElementById('email').value;
            if (nick.length < 2) { alert("Введите никнейм!"); return; }
            
            document.getElementById('userName').innerText = nick;
            document.getElementById('userMail').innerText = email || "no-email@gmail.com";
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('cabinet').style.display = 'block';
        }

        // Плавная накрутка баланса
        function animateBalance(target) {
            let current = 0;
            let step = target / 50;
            let interval = setInterval(() => {
                current += step;
                if (current >= target) {
                    current = target;
                    clearInterval(interval);
                }
                document.getElementById('balance').innerText = Math.floor(current) + " G";
            }, 30);
        }

        function checkCode() {
            let code = document.getElementById('adminCode').value.toUpperCase();
            if (code === "ADMIN") {
                animateBalance(2500);
                document.getElementById('invGrid').innerHTML = `
                    <div class="skin-card">
                        <img src="https://wiki.standoff2.com/images/thumb/7/7f/M9_Bayonet_%22Dragon_Glass%22.png/256px-M9_Bayonet_%22Dragon_Glass%22.png">
                        <div>M9 Bayonet<br><b>Dragon Glass</b></div>
                    </div>
                    <div class="skin-card">
                        <img src="https://wiki.standoff2.com/images/thumb/c/c3/AWM_%22Genesis%22.png/256px-AWM_%22Genesis%22.png">
                        <div>AWM<br><b>Genesis</b></div>
                    </div>
                `;
                alert("Код активирован! +2500 Gold и предметы добавлены.");
                document.getElementById('adminCode').value = "";
            } else {
                alert("Неверный код или срок действия истек.");
            }
        }

        function previewImage(event) {
            let reader = new FileReader();
            reader.onload = function(){
                let img = document.getElementById('avatarImg');
                img.src = reader.result;
                img.style.display = 'block';
                document.getElementById('plusText').style.display = 'none';
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
