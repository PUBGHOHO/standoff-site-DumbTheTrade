<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDOFF HUB | Личный кабинет</title>
    <style>
        :root { --orange: #ff4500; --dark: #0a0a0a; --card: rgba(22, 22, 22, 0.9); --text: #ffffff; }
        
        body { 
            background: var(--dark); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
        }

        /* Фоновое изображение с размытием */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Картинка с кейсами и оружием */
            background-image: url('https://img.freepik.com/free-photo/view-of-gaming-equipment-with-neon-lights_23-2151048805.jpg'); 
            background-size: cover;
            background-position: center;
            filter: blur(10px); 
            -webkit-filter: blur(10px);
            z-index: -1; 
            transform: scale(1.1); 
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            padding: 25px; 
            background: var(--card); 
            border-radius: 25px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { color: var(--orange); margin-bottom: 5px; font-weight: 800; letter-spacing: 2px; }
        
        .google-btn {
            background: white; color: #444; padding: 12px;
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-weight: bold;
            margin: 20px 0; border: none; width: 100%;
            transition: 0.3s;
        }
        .google-btn:hover { background: #ddd; transform: translateY(-2px); }
        
        input {
            width: 100%; padding: 14px; margin: 10px 0;
            border-radius: 12px; border: 1px solid #444;
            background: rgba(0, 0, 0, 0.5); color: white; box-sizing: border-box;
            outline: none;
        }
        
        .btn-main {
            background: var(--orange); color: white; border: none;
            padding: 16px; width: 100%; border-radius: 12px;
            font-weight: bold; cursor: pointer; font-size: 16px;
            text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-main:hover { background: #ff5e00; box-shadow: 0 5px 15px rgba(255, 69, 0, 0.4); }

        #cabinet { display: none; }
        
        .avatar-circle {
            width: 120px; height: 120px; background: rgba(51, 51, 51, 0.6);
            border-radius: 50%; margin: 20px auto; overflow: hidden;
            border: 4px solid var(--orange); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.3);
        }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 25px 0; }
        .stat-item { background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);}
        .stat-item span { color: var(--orange); font-weight: bold; font-size: 20px; display: block; margin-top: 5px; }
        
        .inventory-box { 
            background: rgba(0, 0, 0, 0.4); 
            padding: 40px 20px; 
            border-radius: 15px; 
            border: 2px dashed rgba(255, 255, 255, 0.1); 
            margin: 20px 0; 
            color: #aaa; 
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="background-image"></div>

    <div id="auth-form" class="container">
        <h1>STANDOFF HUB</h1>
        <p style="color: #bbb; font-size: 14px;">Войдите в свой аккаунт</p>
        
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18" style="margin-right:10px">
            Войти через Google
        </button>

        <input type="text" id="nick" placeholder="Введите ваш ник">
        <input type="email" id="email" placeholder="Ваш Gmail">
        
        <button class="btn-main" onclick="openCabinet()">СОЗДАТЬ КАБИНЕТ</button>
        <p style="font-size: 10px; color: #666; margin-top: 20px;">Нажимая кнопку, вы соглашаетесь с условиями использования.</p>
    </div>

    <div id="cabinet" class="container">
        <h2 id="userName" style="margin: 0; font-size: 24px;">Никнейм</h2>
        <p id="userMail" style="color: #888; margin: 5px 0 0; font-size: 14px;">email@gmail.com</p>
        
        <div class="avatar-circle" onclick="document.getElementById('photoInput').click()">
            <img id="avatarImg" src="" style="width:100%; height:100%; object-fit: cover; display:none;">
            <span id="plusText" style="font-size: 40px; color: var(--orange);">+</span>
        </div>
        <input type="file" id="photoInput" style="display:none" accept="image/*" onchange="previewImage(event)">

        <div class="stats-grid">
            <div class="stat-item"><small>Баланс</small><span>0 G</span></div>
            <div class="stat-item"><small>Бонусы</small><span>0</span></div>
            <div class="stat-item"><small>Заработок</small><span>0</span></div>
        </div>

        <div class="inventory-box">Ваш инвентарь пуст</div>

        <input type="text" id="adminCode" placeholder="Код администрации" style="text-align: center;">
        <button class="btn-main" onclick="checkCode()">АКТИВИРОВАТЬ</button>
    </div>

    <script>
        function googleLogin() {
            let mail = prompt("Выберите аккаунт Google:", "player@gmail.com");
            if (mail) document.getElementById('email').value = mail;
        }

        function openCabinet() {
            let nick = document.getElementById('nick').value;
            let email = document.getElementById('email').value;

            if (nick.length < 2 || !email.includes('@')) {
                alert("Заполните ник и почту!");
                return;
            }

            document.getElementById('userName').innerText = nick;
            document.getElementById('userMail').innerText = email;
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('cabinet').style.display = 'block';
        }

        function previewImage(event) {
            let reader = new FileReader();
            reader.onload = function(){
                let img = document.getElementById('avatarImg');
                img.src = reader.result;
                img.style.display = 'block';
                document.getElementById('plusText').style.display = 'none';
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function checkCode() {
            let code = document.getElementById('adminCode').value;
            if (code.toUpperCase() === "ADMIN") {
                alert("Успешно! Начислено 500 G.");
            } else {
                alert("Код не найден.");
            }
        }
    </script>
</body>
</html>
