<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDOFF HUB | Личный кабинет</title>
    <style>
        :root { --orange: #ff4500; --dark: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { 
            background: var(--dark); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .container { 
            width: 100%; 
            max-width: 400px; 
            padding: 20px; 
            background: var(--card); 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: var(--orange); margin-bottom: 5px; }
        .google-btn {
            background: white; color: #444; padding: 12px;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-weight: bold;
            margin: 20px 0; border: none; width: 100%;
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 10px; border: 1px solid #333;
            background: #222; color: white; box-sizing: border-box;
        }
        .btn-main {
            background: var(--orange); color: white; border: none;
            padding: 15px; width: 100%; border-radius: 10px;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }
        /* Стили кабинета */
        #cabinet { display: none; }
        .avatar-circle {
            width: 110px; height: 110px; background: #333;
            border-radius: 50%; margin: 20px auto; overflow: hidden;
            border: 3px solid var(--orange); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-item { background: #222; padding: 10px; border-radius: 10px; }
        .stat-item span { color: var(--orange); font-weight: bold; font-size: 18px; }
        .inventory-box { background: #111; padding: 30px; border-radius: 10px; border: 1px dashed #444; margin: 15px 0; color: #666; }
    </style>
</head>
<body>

    <div id="auth-form" class="container">
        <h1>STANDOFF HUB</h1>
        <p style="color: #888;">Войдите через Google</p>
        
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18" style="margin-right:10px">
            Войти через Google
        </button>

        <input type="text" id="nick" placeholder="Введите ваш ник">
        <input type="email" id="email" placeholder="Ваш Gmail">
        
        <button class="btn-main" onclick="openCabinet()">СОЗДАТЬ КАБИНЕТ</button>
        <p style="font-size: 11px; color: #555; margin-top: 15px;">Нажимая кнопку, вы соглашаетесь с Cookie и политикой конфиденциальности.</p>
    </div>

    <div id="cabinet" class="container">
        <h2 id="userName" style="margin-bottom: 0;">Никнейм</h2>
        <p id="userMail" style="color: #666; margin-top: 5px; font-size: 14px;">email@gmail.com</p>
        
        <div class="avatar-circle" onclick="document.getElementById('photoInput').click()">
            <img id="avatarImg" src="" style="width:100%; height:100%; object-fit: cover; display:none;">
            <span id="plusText" style="font-size: 30px;">+</span>
        </div>
        <input type="file" id="photoInput" style="display:none" accept="image/*" onchange="previewImage(event)">

        <div class="stats-grid">
            <div class="stat-item"><small>Баланс</small><br><span>0 G</span></div>
            <div class="stat-item"><small>Бонусы</small><br><span>0</span></div>
            <div class="stat-item"><small>Заработок</small><br><span>0</span></div>
        </div>

        <div class="inventory-box">Инвентарь пуст</div>

        <input type="text" id="adminCode" placeholder="Код администрации">
        <button class="btn-main" onclick="checkCode()">ПОПОЛНИТЬ КОДОМ</button>
    </div>

    <script>
        function googleLogin() {
            let mail = prompt("Выберите аккаунт Google:", "example@gmail.com");
            if (mail) document.getElementById('email').value = mail;
        }

        function openCabinet() {
            let nick = document.getElementById('nick').value;
            let email = document.getElementById('email').value;

            if (nick.length < 2 || !email.includes('@')) {
                alert("Пожалуйста, заполните все поля правильно!");
                return;
            }

            document.getElementById('userName').innerText = nick;
            document.getElementById('userMail').innerText = email;
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('cabinet').style.display = 'block';
        }

        function previewImage(event) {
            let reader = new FileReader();
            reader.onload = function(){
                let img = document.getElementById('avatarImg');
                img.src = reader.result;
                img.style.display = 'block';
                document.getElementById('plusText').style.display = 'none';
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function checkCode() {
            let code = document.getElementById('adminCode').value;
            if (code.toUpperCase() === "ADMIN") {
                alert("Успешно! Администратор начислил вам 500 G.");
            } else {
                alert("Неверный код или код уже использован.");
            }
        }
    </script>
</body>
</html>
