<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STANDOFF HUB | Личный кабинет</title>
    <style>
        :root {
            --orange: #ff4500;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            /* Фон в стиле Стандофф */
            background: url('https://i.ytimg.com/vi/VpI-yY_85K0/maxresdefault.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* Сильное размытие фона */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            z-index: -1;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        h2 { color: var(--orange); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--orange);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .btn:hover { background: #e63e00; transform: scale(1.02); }

        #profile-ui { display: none; }

        /* Аватарка */
        .avatar-box {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            cursor: pointer;
            position: relative;
        }

        #avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--orange);
            box-shadow: 0 0 20px var(--orange);
        }

        .balance-card {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-up {
            color: var(--orange);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
        }

        .check { color: #00ff00; display: none; font-size: 20px; margin-left: 8px; }
    </style>
</head>
<body>

    <div id="auth-ui" class="container">
        <h2>Standoff Hub</h2>
        <p style="opacity: 0.7;">Войдите через Google</p>
        <input type="text" id="nick" placeholder="Введите ваш ник">
        <input type="email" id="mail" placeholder="Ваш Gmail">
        <button class="btn" onclick="login()">Создать кабинет</button>
        <p style="font-size: 10px; margin-top: 20px; opacity: 0.5;">Нажимая кнопку, вы соглашаетесь с Cookie и политикой конфиденциальности.</p>
    </div>

    <div id="profile-ui" class="container">
        <div class="avatar-box" onclick="document.getElementById('upload').click()">
            <img id="avatar-img" src="https://via.placeholder.com/120" alt="Avatar">
            <input type="file" id="upload" hidden accept="image/*" onchange="changeAva(event)">
        </div>
        
        <h3 id="user-nick" style="margin: 0;">Игрок</h3>
        <p id="user-mail" style="font-size: 12px; opacity: 0.6; margin-bottom: 20px;"></p>

        <div class="balance-card">
            <span>Баланс: <b style="font-size: 20px;">0 G</b></span>
            <span class="top-up" onclick="alert('Перенаправление на страницу оплаты...')">ПОПОЛНИТЬ</span>
        </div>

        <input type="text" placeholder="Введите код на подарок">
        <button class="btn" onclick="window.location.href='https://help.standoff2.com/ru/'">Активировать код</button>
